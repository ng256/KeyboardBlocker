; Description: WinRAR SFX script for Keyboard Blocker
;-----------------------------------------------------------------------------

; Install to user AppData (correct place for such tools)
Path=%APPDATA%\Keyblock

; Kill running instance silently
;Presetup=cmd /c taskkill /F /IM keyblock.exe >nul 2>&1

; Run install script
Setup=wscript.exe //B //nologo "install.js"

; SFX dialog logo
SetupIcon=icon.png

Overwrite=1

; Overview dialog
Title=Keyboard Blocker Setup
Text
{
This will install Keyboard Blocker – a small utility that blocks keyboard input.

After extraction, the program will be added to Windows startup
and will run automatically each time you log in.

To unblock the keyboard, simply type the word "unblock".
To exit the program completely, right-click the tray icon and select Exit.

No additional files will be installed. The program runs from this folder.
}

; Completion dialog
TextDone=Installation Complete
{
Keyboard Blocker has been successfully installed.

The program will run automatically each time you log in.
You can also start it manually from the installation folder.

To unblock the keyboard when it is blocked, simply type "unblock".
To exit the program completely, right-click the tray icon and select Exit.

If you wish to remove the program, delete the installation folder
and remove the "Keyboard Blocker" entry from Windows startup
(using Task Manager or Registry Editor).
}

